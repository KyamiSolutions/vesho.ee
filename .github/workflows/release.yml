name: Deploy Vesho CRM

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release ZIPs
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TODAY="$(date +%Y-%m-%d)"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TODAY=${TODAY}" >> $GITHUB_ENV

          # Tõsta versioon failides enne ZIP loomist (eemalda CRLF enne sed-i)
          sed -i 's/\r//' vesho-crm.php
          sed -i 's/\r//' theme/style.css
          sed -i "s/^\( \* Version:\s*\).*/\1${VERSION}/" vesho-crm.php
          sed -i "s/^define('VESHO_CRM_VERSION', '[^']*')/define('VESHO_CRM_VERSION', '${VERSION}')/" vesho-crm.php
          sed -i "s/^Version:.*/Version: ${VERSION}/" theme/style.css

          mkdir -p dist releases

          # Plugin ZIP: must have vesho-crm/ folder inside so WP updater finds it
          mkdir -p /tmp/vesho-crm-build/vesho-crm
          rsync -a \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="dist" \
            --exclude="releases" \
            --exclude="theme" \
            . /tmp/vesho-crm-build/vesho-crm/
          cd /tmp/vesho-crm-build && zip -r $GITHUB_WORKSPACE/dist/vesho-crm.zip vesho-crm/
          cd $GITHUB_WORKSPACE

          # Teema ZIP peab sisaldama kausta "vesho/" mitte "theme/"
          cp -r theme /tmp/vesho
          cd /tmp && zip -r $GITHUB_WORKSPACE/dist/vesho-theme.zip vesho/ --exclude "*.git*"
          cd $GITHUB_WORKSPACE

      - name: Update version JSON files
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TODAY="$(date +%Y-%m-%d)"
          PLUGIN_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vesho-crm.zip"
          THEME_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vesho-theme.zip"

          python3 -c "
          import json, os
          version = '${VERSION}'
          today   = '${TODAY}'
          plugin_url = '${PLUGIN_URL}'
          theme_url  = '${THEME_URL}'

          # Read existing changelog so we don't overwrite it
          try:
            with open('releases/plugin-info.json') as f:
              existing_plugin = json.load(f)
            plugin_changelog = existing_plugin.get('changelog', '')
          except Exception:
            plugin_changelog = ''
          # Prepend new version entry only if not already present
          entry = f'<h4>{version}</h4><ul><li>Uus versioon</li></ul>'
          if f'<h4>{version}</h4>' not in plugin_changelog:
            plugin_changelog = entry + plugin_changelog

          try:
            with open('releases/theme-info.json') as f:
              existing_theme = json.load(f)
            theme_changelog = existing_theme.get('changelog', '')
          except Exception:
            theme_changelog = ''
          if f'<h4>{version}</h4>' not in theme_changelog:
            theme_changelog = entry + theme_changelog

          plugin = {
            'name': 'Vesho CRM',
            'slug': 'vesho-crm',
            'version': version,
            'download_url': plugin_url,
            'requires': '6.0',
            'tested': '6.7',
            'last_updated': today,
            'changelog': plugin_changelog
          }
          with open('releases/plugin-info.json', 'w') as f:
            json.dump(plugin, f, indent=2, ensure_ascii=False)

          theme = {
            'name': 'Vesho',
            'slug': 'vesho',
            'version': version,
            'download_url': theme_url,
            'requires': '6.0',
            'tested': '6.7',
            'last_updated': today,
            'changelog': theme_changelog
          }
          with open('releases/theme-info.json', 'w') as f:
            json.dump(theme, f, indent=2, ensure_ascii=False)
          print('JSON files updated')
          "

      - name: Commit version JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/plugin-info.json releases/theme-info.json
          git diff --staged --quiet || git commit -m "chore: versioon ${{ github.ref_name }} JSON-id [skip ci]"
          git push origin HEAD:main || echo "Push skipped - no new changes"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vesho-crm.zip
            dist/vesho-theme.zip
          name: "Vesho ${{ github.ref_name }}"
          body: |
            ## Vesho ${{ github.ref_name }}
            WordPress uuendused on saadaval **Töölaud → Uuendused** lehel.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
