name: Release Vesho CRM

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.6.6)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create plugin ZIP
        run: |
          mkdir -p dist
          zip -r dist/vesho-crm.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude "*.log" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db"
          echo "Plugin ZIP created: $(du -sh dist/vesho-crm.zip)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/vesho-crm.zip
          name: "Vesho CRM v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Vesho CRM v${{ steps.version.outputs.VERSION }}

            ### Paigaldamine
            1. Laadi alla `vesho-crm.zip`
            2. WordPress Admin → Pluginad → Lisa uus → Laadi üles
            3. Aktiveeri plugin

            Või uuendus toimub automaatselt läbi WP Dashboard → Uuendused.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to live server via FTP
        if: secrets.FTP_HOST != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /public_html/wp-content/plugins/vesho-crm/
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/dist/**
