name: Deploy Vesho CRM

on:
  push:
    branches:
      - main        # iga push → deploy live serverisse
    tags:
      - 'v*.*.*'    # tag → deploy + uuendused + GitHub Release
  workflow_dispatch: # käsitsi käivitamine GitHub veebist

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Deploy plugin live serverisse ──────────────────────────────────
      - name: Deploy plugin to live server (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /public_html/wp-content/plugins/vesho-crm/
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/dist/**
            **/releases/**
            **/theme/**

      # ── 2. Deploy teema live serverisse ───────────────────────────────────
      - name: Deploy theme to live server (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./theme/
          server-dir: /public_html/wp-content/themes/vesho/
          exclude: |
            **/.git*
            **/.gitignore

      # ── 3. Ehita release paketid (ainult tagide puhul) ────────────────────
      - name: Build release packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # eemalda 'v' eesliide (v1.6.5 → 1.6.5)
          TODAY="$(date +%Y-%m-%d)"

          mkdir -p dist releases

          # Plugin ZIP
          zip -r dist/vesho-crm.zip . \
            --exclude "*.git*" \
            --exclude "*/.github/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/dist/*" \
            --exclude "*/releases/*"

          # Teema ZIP
          zip -r dist/vesho-theme.zip ./theme/

          # Kopeeri ZIPid releases/ kausta (lähevad FTP-ga serverile)
          cp dist/vesho-crm.zip releases/vesho-crm.zip
          cp dist/vesho-theme.zip releases/vesho-theme.zip

          # Genereeri plugin-info.json
          cat > releases/plugin-info.json << ENDJSON
          {
            "name": "Vesho CRM",
            "slug": "vesho-crm",
            "version": "${VERSION}",
            "download_url": "https://vesho.ee/wp-content/uploads/vesho-releases/vesho-crm.zip",
            "requires": "6.0",
            "tested": "6.7",
            "last_updated": "${TODAY}",
            "changelog": "<h4>${VERSION} (${TODAY})</h4><ul><li>Automaatne uuendus GitHubist</li></ul>"
          }
          ENDJSON

          # Genereeri theme-info.json
          cat > releases/theme-info.json << ENDJSON
          {
            "name": "Vesho",
            "slug": "vesho",
            "version": "${VERSION}",
            "download_url": "https://vesho.ee/wp-content/uploads/vesho-releases/vesho-theme.zip",
            "requires": "6.0",
            "tested": "6.7",
            "last_updated": "${TODAY}",
            "changelog": "<h4>${VERSION} (${TODAY})</h4><ul><li>Automaatne uuendus GitHubist</li></ul>"
          }
          ENDJSON

      # ── 4. Lae ZIPid + JSONid live serverile ──────────────────────────────
      - name: Upload releases to live server (FTP)
        if: startsWith(github.ref, 'refs/tags/')
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./releases/
          server-dir: /public_html/wp-content/uploads/vesho-releases/

      # ── 5. Loo GitHub Release (arhiiv + backup) ───────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vesho-crm.zip
            dist/vesho-theme.zip
          name: "Vesho ${{ github.ref_name }}"
          body: |
            ## Vesho ${{ github.ref_name }}

            ✅ Plugin ja teema on automaatselt live serverisse deployitud.
            ✅ WordPress uuendused on saadaval `Töölaud → Uuendused` lehel.

            ### Käsitsi install
            Lae alla `vesho-crm.zip` või `vesho-theme.zip` ja lae üles WP Admin → Plugins/Themes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
